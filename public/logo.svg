  <!-- Brownie square with bite taken from top-right -->
  <path d="M55,38 L140,38 Q142,38 142,40 L142,48 Q148,44 152,42 Q154,46 150,52 Q154,54 156,58 L156,110 Q156,112 154,112 L55,112 Q53,112 53,110 L53,40 Q53,38 55,38 Z"
